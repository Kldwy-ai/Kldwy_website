<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>开朗的网友 · 个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;  /* 禁止文本选择 */
        }

        body {
            min-height: 100vh;
            /* 修正：使用正确的大小写 Sky.png (大写S) */
            background: url('./bgpic/Sky.png') no-repeat center center fixed;
            background-size: cover;
            /* 降级背景色（仅在图片加载失败时显示） */
            background-color: #0b1120;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 毛玻璃卡片 - 动态彩色渐变 + 模糊，背景图片清晰可见 */
.glass-card {
    max-width: 880px;
    width: 100%;
    /* 动态渐变背景（半透明） */
    background: linear-gradient(135deg, 
        rgba(255, 80, 120, 0.25), 
        rgba(0, 200, 255, 0.25), 
        rgba(180, 70, 255, 0.25), 
        rgba(255, 200, 50, 0.25));
    background-size: 300% 300%;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 2.5rem;
    padding: 2.2rem 2rem;
    box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.25);
    transition: all 0.2s;
    animation: rgbGradientFlow 2s ease infinite;
}

/* 动态渐变流动动画 */
@keyframes rgbGradientFlow {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}

        .profile-row {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .avatar-frame {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            padding: 3px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid white;
            background: #2c2c3a;
            display: block;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
            border-left: 3px solid #ffd966;
            padding-left: 0.75rem;
            margin: 0.6rem 0 1.8rem 0;
            backdrop-filter: blur(2px);
            display: inline-block;
        }

        .section {
            margin-top: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            display: inline-block;
            border-bottom: 2px solid #ffd966;
            padding-bottom: 5px;
            margin-bottom: 1.2rem;
        }

        .platform-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
        }

        .platform-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 0.7rem 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.25);
            text-decoration: none;
            color: white;
            font-weight: 500;
            flex: 1 0 150px;
            justify-content: center;
        }

        .platform-card svg {
            width: 26px;
            height: 26px;
        }

        .platform-card:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
            border-color: #ffd966;
        }

        .copy-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
        }

        .copy-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1 0 150px;
            justify-content: center;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: #ffd966;
            color: #1e1e2a;
            transform: scale(0.98);
        }

        .copy-icon {
            font-size: 1.4rem;
            width: 28px;
            text-align: center;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #ffecb3;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            border-left: 4px solid #ffc107;
            white-space: nowrap;
        }

        .toast-msg.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        @media (max-width: 650px) {
            .glass-card { padding: 1.5rem; }
            .profile-row { flex-direction: column; text-align: center; }
            .profile-name { font-size: 1.5rem; }
            .subtitle { text-align: center; border-left: none; border-top: 2px solid #ffd966; padding-top: 6px; display: block; width: fit-content; margin: 0 auto 1.5rem auto; }
            .platform-card, .copy-btn { min-width: 130px; }
            .toast-msg { white-space: normal; max-width: 85vw; }
        }
    </style>
</head>

<div id="toastMsg" class="toast-msg">✅ 已复制</div>

<script>
    (function() {
        // 验证背景图是否正确加载（控制台输出辅助）
        const bgImg = new Image();
        bgImg.onload = () => console.log('✅ 背景图 Sky.png 加载成功');
        bgImg.onerror = () => console.warn('⚠️ 背景图未加载，请确认文件路径: ./bgpic/Sky.png (注意大写S)');
        bgImg.src = './bgpic/Sky.png';

        // 复制功能
        const toast = document.getElementById('toastMsg');
        function showMsg(msg, isErr = false) {
            toast.textContent = msg;
            toast.style.background = isErr ? '#b52e2ed9' : '#000000d9';
            toast.style.borderLeftColor = isErr ? '#ff8888' : '#ffc107';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function copyText(text, platform) {
            try {
                await navigator.clipboard.writeText(text);
                showMsg(`✅ 已复制 ${platform} ID：${text}`);
            } catch(e) {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                if(ok) showMsg(`📋 已复制 ${platform} ID：${text}`);
                else showMsg(`❌ 复制失败，请手动复制：${text}`, true);
            }
        }

        document.querySelectorAll('.copy-btn').forEach(btn => {
            const copyVal = btn.getAttribute('data-copy');
            const platformName = btn.getAttribute('data-name');
            if(copyVal && platformName) {
                btn.addEventListener('click', () => copyText(copyVal, platformName));
            }
        });
    })();
</script>
